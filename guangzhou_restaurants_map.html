            { id: 27, name: "禄运茶居·手工点心(体育西店)", address: "广东省广州市天河区六运一街17号文昌商务楼1-3层", district: "天河" },
            { id: 28, name: "大可以饭店(天河都市广场店)", address: "广东省广州市天河区员村二横路2号天河都市购物广场5楼", district: "天河" },
            { id: 29, name: "牛小灶牛杂煲(体育西路店)", address: "广东省广州市天河区体育西路75号143房-牛小灶牛杂煲(体育西路店)", district: "天河" },
            { id: 30, name: "粤顺粤德·粤菜品牌(天河南二路分店)", address: "广州市天河区天河南二路宏发大厦二楼粤顺粤德", district: "天河" },
            { id: 31, name: "肥强顺德干蒸(广州首店)", address: "天河区天河南2路宏发大厦首层肥强顺德干蒸", district: "天河" },
            { id: 32, name: "小荔园豉油鸡(正佳广场店)", address: "广东省广州市天河区天河南街道正佳广场3楼东街(东南门)", district: "天河" },

            { id: 35, name: "牛小灶牛杂煲(体育西横街店)", address: "体育西横街12号首层(牛小灶牛杂煲)", district: "天河" },

            { id: 38, name: "叹茶靓点(信达金茂广场店)", address: "广州市天河区广州大道北980号金茂广场5楼", district: "天河" },

            { id: 40, name: "新兴饭店(北京路店)", address: "广州市越秀区北京路15号第二层201铺", district: "越秀" },

            { id: 42, name: "新穗悦酒家", address: "广东省广州市越秀区环市东路403号广州国际电子大厦第五层", district: "越秀" },
            { id: 43, name: "大三元酒家(长堤总店)", address: "广州市越秀区长堤大马路258-266号,长堤大三元酒家7楼办公室", district: "越秀" },
            { id: 44, name: "惠爱饭店·岭南第一鸡(沿江路店)", address: "广东省广州市越秀区挹翠路3号首层至三层", district: "越秀" },
            { id: 45, name: "潮发潮汕牛肉店(北京路店)", address: "珠光路201-203号", district: "越秀" },
            { id: 46, name: "潮发潮汕牛肉店(五月花广场店)", address: "广东省广州市越秀区中山五路68号五月花商业广场F4", district: "越秀" },
            { id: 47, name: "潮发潮汕牛肉店(星寰店)", address: "广东省广州市越秀区侨光西路11号星寰广场4层23~24号铺", district: "越秀" },
            { id: 48, name: "合里鲜牛肉火锅", address: "广东省广州市越秀区北京街道西湖路38号首层102铺潮汕", district: "越秀" },
            { id: 49, name: "小荔园豉油鸡·臻园(星寰店)", address: "广东省广州市越秀区星寰国际5楼小荔园豉油鸡", district: "越秀" },
            { id: 50, name: "正哥点心专家(新塘大润发店)", address: "广州市增城区新塘镇金海岸广场3楼正哥点心", district: "增城" }
        ];

        // 初始化地图
        const map = new TMap.Map('map', {
            center: new TMap.LatLng(23.1251, 113.2806),
            zoom: 11,
            viewMode: '2D'
        });

        // 创建地址解析服务
        const geocoder = new TMap.service.Geocoder();
        const searchService = new TMap.service.Search({ pageSize: 1 });

        // 存储成功解析的店铺
        const successfulShops = [];
        const failedShops = [];

        // 更新统计
        function updateStats() {
            document.getElementById('totalCount').textContent = restaurants.length;
            document.getElementById('successCount').textContent = successfulShops.length;
            document.getElementById('failCount').textContent = failedShops.length;
        }

        // 创建自定义标记样式 - 使用圆形背景显示序号
        const markerStyles = {
            'restaurant': new TMap.MarkerStyle({
                width: 28,
                height: 28,
                anchor: { x: 14, y: 28 },
                color: '#FFFFFF',
                size: 11,
                direction: 'center',
                backgroundColor: '#EE5A24',
                backgroundBorderRadius: 14,
                padding: '2px 4px',
                backgroundBorderWidth: 2,
                backgroundBorderColor: '#FFFFFF'
            })
        };

        // 创建标记图层
        const markerLayer = new TMap.MultiMarker({
            id: 'restaurant-markers',
            map: map,
            styles: markerStyles,
            geometries: []
        });

        // 解析单个店铺地址
        async function geocodeRestaurant(restaurant) {
            try {
                // 优先使用店铺名称+地址搜索
                const searchKeyword = restaurant.name;
                const searchResult = await searchService.searchRegion({
                    keyword: searchKeyword,
                    cityName: '广州市',
                    autoExtend: true
                });

                if (searchResult.status === 0 && searchResult.data && searchResult.data.length > 0) {
                    const poi = searchResult.data[0];
                    return {
                        success: true,
                        position: poi.location,
                        id: restaurant.id,
                        name: restaurant.name,
                        address: poi.address || restaurant.address,
                        district: restaurant.district
                    };
                }

                // 如果搜索失败，尝试地址解析
                const geoResult = await geocoder.getLocation({
                    address: restaurant.address,
                    region: '广州市'
                });

                if (geoResult.status === 0 && geoResult.result && geoResult.result.location) {
                    return {
                        success: true,
                        position: geoResult.result.location,
                        id: restaurant.id,
                        name: restaurant.name,
                        address: restaurant.address,
                        district: restaurant.district
                    };
                }

                return { success: false, name: restaurant.name, error: '未找到位置' };
            } catch (error) {
                return { success: false, name: restaurant.name, error: error.message };
            }
        }

        // 批量处理所有店铺
        async function processAllRestaurants() {
            const loadingEl = document.getElementById('loading');
            const progressEl = document.getElementById('progress');
            
            updateStats();

            // 分批处理，每批5个
            const batchSize = 5;
            for (let i = 0; i < restaurants.length; i += batchSize) {
                const batch = restaurants.slice(i, i + batchSize);
                progressEl.textContent = `正在解析: ${i + 1} / ${restaurants.length}`;
                
                const promises = batch.map((restaurant) => 
                    geocodeRestaurant(restaurant)
                );
                
                const results = await Promise.all(promises);
                
                results.forEach(result => {
                    if (result.success) {
                        successfulShops.push(result);
                    } else {
                        failedShops.push(result);
                    }
                });
                
                updateStats();
                
                // 延迟一下避免请求过快
                if (i + batchSize < restaurants.length) {
                    await new Promise(resolve => setTimeout(resolve, 200));
                }
            }

            // 添加标记到地图
            const geometries = successfulShops.map(shop => ({
                id: `shop_${shop.id}`,
                styleId: 'restaurant',
                position: shop.position,
                properties: {
                    id: shop.id,
                    name: shop.name,
                    address: shop.address,
                    district: shop.district
                },
                content: String(shop.id)
            }));

            markerLayer.setGeometries(geometries);

            // 如果有成功的店铺，调整地图视野
            if (successfulShops.length > 0) {
                const bounds = new TMap.LatLngBounds();
                successfulShops.forEach(shop => {
                    bounds.extend(shop.position);
                });
                map.fitBounds(bounds, { padding: 50 });
            }

            // 隐藏加载提示
            loadingEl.style.display = 'none';

            // 显示失败列表（如果有）
            if (failedShops.length > 0) {
                console.log('定位失败的店铺:', failedShops);
            }
        }

        // 点击标记显示详情
        markerLayer.on('click', (event) => {
            const geometry = event.geometry;
            if (geometry && geometry.properties) {
                const infoDiv = document.getElementById('info');
                infoDiv.innerHTML = `
                    <h4>[${geometry.properties.id}] ${geometry.properties.name}</h4>
                    <p><strong>所属区域:</strong> ${geometry.properties.district}区</p>
                    <p><strong>地址:</strong> ${geometry.properties.address}</p>
                `;
                infoDiv.style.display = 'block';
            }
        });

        // 点击地图其他地方隐藏信息框
        map.on('click', () => {
            document.getElementById('info').style.display = 'none';
        });

        // 开始处理
        processAllRestaurants();
    </script>
</body>
